<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Пешечные войны</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"
        integrity="sha512-TU/clvRaSqKB43MX6dvJPEWV8tEGDTbmT4mdxTs6DSYsBY9zKmiw4Qeykp0nS10ndH14HRNG2VWN+IjiMfA17Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-top: #1a5f7a;
            --bg-bottom: #159895;
            --surface: #ffffff;
            --surface-soft: #f0faf8;
            --ink: #0d3d4d;
            --ink-muted: #4a7a88;
            --accent: #ff9f1c;
            --accent-dark: #e8890b;
            --success: #2ec4b6;
            --danger: #ef476f;
            --shadow: 0 8px 32px rgba(13, 61, 77, 0.18);
            --radius: 20px;
            --radius-sm: 14px;
            --touch: min(52px, 12vw);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: 'Nunito', system-ui, sans-serif;
            color: var(--ink);
            background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-bottom) 55%, #0c4a6e 100%);
            background-attachment: fixed;
        }

        .app {
            max-width: 720px;
            margin: 0 auto;
            padding: max(12px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--surface);
        }

        .brand__logo-img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: block;
            flex-shrink: 0;
        }

        .brand__text {
            text-align: left;
            line-height: 1.15;
        }

        .brand__title {
            margin: 0;
            font-size: clamp(1.15rem, 4vw, 1.45rem);
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .brand__tagline {
            margin: 0;
            font-size: 0.72rem;
            font-weight: 600;
            opacity: 0.88;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            flex: 1;
            min-width: min(100%, 120px);
        }

        .btn {
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: var(--touch);
            padding: 0 16px;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn--primary {
            background: var(--surface);
            color: var(--bg-top);
            box-shadow: var(--shadow);
        }

        .btn--primary:hover {
            background: var(--surface-soft);
        }

        .btn--ghost {
            background: rgba(255, 255, 255, 0.2);
            color: var(--surface);
            backdrop-filter: blur(8px);
        }

        .btn--ghost:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn__icon {
            font-size: 1.15rem;
            line-height: 1;
        }

        .status-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px 18px;
            text-align: center;
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.15rem);
            color: var(--ink);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            min-height: 3.2em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
        }

        .status-card__text {
            margin: 0;
            line-height: 1.3;
        }

        .status-card .btn--again {
            width: 100%;
            max-width: 280px;
            min-height: var(--touch);
            font-size: 1rem;
            display: none;
            position: absolute;
            top: 80px;
        }

        .status-card .btn--again.is-visible {
            display: block;
        }

        .board-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            min-height: 0;
            overflow: visible;
        }

        .board-stage {
            position: relative;
            width: min(92vmin, 100%);
            max-width: 560px;
            margin: 0 auto;
            overflow: visible;
        }

        #board {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.25);
        }

        .engineering-bar {
            display: none;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: auto;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (min-width: 1024px) and (pointer: fine) {
            .engineering-bar {
                display: flex;
            }
        }

        .engineering-bar__label {
            width: 100%;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 2px;
        }

        .engineering-bar .btn {
            font-size: 0.82rem;
            min-height: 38px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--ink);
        }

        .engineering-bar .btn:hover {
            background: var(--surface);
        }

        #difficulty-select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: var(--surface);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--ink);
            max-width: 100%;
        }

        .engineering-bar label[for="difficulty-select"] {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            white-space: nowrap;
        }

        #pgn {
            position: absolute;
            left: 0;
            right: 0;
            top: 100%;
            margin-top: 10px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-sm);
            font-size: clamp(0.75rem, 2.8vw, 0.88rem);
            font-weight: 600;
            color: var(--ink-muted);
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.45;
            box-shadow: var(--shadow);
            text-align: left;
            z-index: 2;
            pointer-events: auto;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
            background: rgba(13, 61, 77, 0.55);
            backdrop-filter: blur(6px);
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .modal-overlay[hidden] {
            display: none !important;
        }

        .modal-card {
            width: min(100%, 400px);
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 22px 22px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
            text-align: center;
            animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-card h2 {
            margin: 0 0 8px;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--ink);
        }

        .modal-card p {
            margin: 0 0 18px;
            font-size: 0.95rem;
            color: var(--ink-muted);
            font-weight: 600;
        }

        .modal-start-logo {
            display: block;
            width: min(64vw, 220px);
            height: auto;
            max-height: min(38vh, 240px);
            margin: 0 auto 18px;
            object-fit: contain;
            /* filter: drop-shadow(0 6px 16px rgba(13, 61, 77, 0.2)); */
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-actions .btn {
            width: 100%;
            min-height: 54px;
            font-size: 1.05rem;
        }

        .btn--white {
            background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%);
            color: var(--ink);
            border: 2px solid #e0e0e0;
        }

        .btn--black {
            background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
            color: #fff;
            border: 2px solid #444;
        }

        .btn--duo {
            background: linear-gradient(90deg, var(--success) 0%, #20b2aa 100%);
            color: #fff;
        }

        .btn--easy {
            background: linear-gradient(180deg, #8ce99a 0%, #57c269 100%);
            color: #0d3d1a;
        }

        .btn--medium {
            background: linear-gradient(180deg, #ffd166 0%, var(--accent) 100%);
            color: #4a3200;
        }

        .btn--hard {
            background: linear-gradient(180deg, #ff8a9b 0%, var(--danger) 100%);
            color: #fff;
        }

        .btn--back {
            background: transparent;
            color: var(--ink-muted);
            box-shadow: none;
            min-height: 44px;
            margin-bottom: 4px;
        }

        .btn--back:hover {
            color: var(--ink);
            background: var(--surface-soft);
        }

        .square-hint {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            color: black;
            background-color: #f0f0f0b3;
            border-radius: 20px;
            border: 1px solid black;
        }

        .move-top-1 {
            background-color: rgb(0 237 0);
            z-index: 5;
        }

        .move-top-2 {
            background-color: rgb(0 180 0);
            z-index: 4;
        }

        .move-top-3 {
            background-color: rgb(0 100 0);
            z-index: 3;
        }

        .square-index {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 10px;
            z-index: 6;
            color: black;
        }

        @media (min-width: 600px) {
            .toolbar {
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="top-bar">
            <a href="." class="brand" id="brand-link" title="Новая игра — выбрать режим">
                <img class="brand__logo-img" src="img/apple-touch-icon.png" width="52" height="52" alt="">
                <span class="brand__text">
                    <h1 class="brand__title">Пешечные войны</h1>
                    <p class="brand__tagline">Дотянись до конца доски!</p>
                </span>
            </a>
            <div class="toolbar">
                <button type="button" class="btn btn--primary" id="undoBtn" title="Отменить ход">
                    <span class="btn__icon" aria-hidden="true">↩</span>
                    <span>Отменить</span>
                </button>
            </div>
        </header>

        <div id="statusbar" class="status-card" role="status" aria-live="polite">
            <p id="statusbar-text" class="status-card__text"></p>
            <button type="button" class="btn btn--duo btn--again" id="playAgainBtn">Сыграть ещё раз</button>
        </div>

        <div class="board-wrap">
            <div class="board-stage">
                <div id="board" aria-label="Шахматная доска"></div>
                <div id="pgn" aria-label="История ходов"></div>
            </div>
        </div>

        <div class="engineering-bar" id="engineering-bar">
            <span class="engineering-bar__label">Инженерное меню</span>
            <button type="button" class="btn" id="movesBtn">Показать оценки</button>
            <button type="button" class="btn" id="godModeBtn">Режим бога: выкл</button>
            <label for="difficulty-select">Сложность ИИ</label>
            <select id="difficulty-select">
                <option value="0">0 Случайно</option>
                <option value="1">1 Лёгкий</option>
                <option value="2" selected>2 Средний</option>
                <option value="3">3 Сложный</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
        </div>
    </div>

    <!-- Выбор режима -->
    <div class="modal-overlay" id="modal-start" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-start-title">
            <img class="modal-start-logo" src="img/apple-touch-icon.png" width="180" height="180" alt=""
                decoding="async">
            <h2 id="modal-start-title">Как хочешь играть?</h2>
            <p>Выбери, за кого играть</p>
            <div class="modal-actions">
                <button type="button" class="btn btn--white" id="modal-play-white">
                    <span class="btn__icon" aria-hidden="true">♔</span>
                    Играть за белых
                </button>
                <button type="button" class="btn btn--black" id="modal-play-black">
                    <span class="btn__icon" aria-hidden="true">♚</span>
                    Играть за чёрных
                </button>
                <button type="button" class="btn btn--duo" id="modal-play-two">
                    <span class="btn__icon" aria-hidden="true">👥</span>
                    Играть вдвоём
                </button>
            </div>
        </div>
    </div>

    <!-- Сложность ИИ -->
    <div class="modal-overlay" id="modal-difficulty" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-diff-title">
            <button type="button" class="btn btn--back" id="modal-diff-back">← Назад</button>
            <h2 id="modal-diff-title">Выбери сложность</h2>
            <p>Чем выше — тем сильнее компьютер</p>
            <div class="modal-actions">
                <button type="button" class="btn btn--easy" data-pick-difficulty="1">Лёгкий</button>
                <button type="button" class="btn btn--medium" data-pick-difficulty="2">Средний</button>
                <button type="button" class="btn btn--hard" data-pick-difficulty="3">Сложный</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
        integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"
        integrity="sha512-WfASs5HtTgTL/eZsLaOftSN9wMQl7WZGlU5UiKx/yxTViMfGh9whWRwKAC27qH8VtZJqSMqDdbq2uUb1tY3jvQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>var exports = {}; var module = {}</script>
    <script src="https://unpkg.com/chess.js@1.1.0/dist/cjs/chess.js"></script>

    <script src="game.js"></script>
    <script src="factors.js"></script>
    <script src="ai.js"></script>
    <script src="script.js"></script>
</body>

</html>
